<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="760" height="420" fill="#f8fafc" rx="8"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">四种多 Agent 协作模式</text>

  <!-- 象限1：Orchestrator -->
  <text x="190" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">① Orchestrator-Worker 主从编排</text>
  <circle cx="190" cy="100" r="22" fill="#6366f1"/><text x="190" y="105" text-anchor="middle" font-size="11" fill="#fff">主</text>
  <g fill="#0ea5e9">
    <circle cx="110" cy="170" r="18"/><circle cx="190" cy="170" r="18"/><circle cx="270" cy="170" r="18"/>
  </g>
  <g text-anchor="middle" font-size="10" fill="#fff">
    <text x="110" y="174">W1</text><text x="190" y="174">W2</text><text x="270" y="174">W3</text>
  </g>
  <g stroke="#64748b" stroke-width="1.5" marker-end="url(#a3)">
    <line x1="175" y1="118" x2="120" y2="153"/><line x1="190" y1="122" x2="190" y2="148"/><line x1="205" y1="118" x2="260" y2="153"/>
  </g>
  <text x="190" y="205" text-anchor="middle" font-size="11" fill="#64748b">任务可分解 · 研究/批处理 · 主节点是单点</text>

  <!-- 象限2：Pipeline -->
  <text x="570" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">② Pipeline 流水线</text>
  <g font-size="11" fill="#fff" text-anchor="middle">
    <rect x="440" y="110" width="70" height="36" rx="8" fill="#0ea5e9"/><text x="475" y="132">需求</text>
    <rect x="535" y="110" width="70" height="36" rx="8" fill="#0ea5e9"/><text x="570" y="132">编码</text>
    <rect x="630" y="110" width="70" height="36" rx="8" fill="#0ea5e9"/><text x="665" y="132">测试</text>
  </g>
  <g stroke="#64748b" stroke-width="1.5" marker-end="url(#a3)">
    <line x1="510" y1="128" x2="530" y2="128"/><line x1="605" y1="128" x2="625" y2="128"/>
  </g>
  <text x="570" y="205" text-anchor="middle" font-size="11" fill="#64748b">流程固定 · 每环可验证 · 错误沿管道放大</text>

  <!-- 象限3：Debate -->
  <text x="190" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">③ Debate 辩论对抗</text>
  <circle cx="120" cy="305" r="22" fill="#ef4444"/><text x="120" y="310" text-anchor="middle" font-size="10" fill="#fff">正方</text>
  <circle cx="260" cy="305" r="22" fill="#f59e0b"/><text x="260" y="310" text-anchor="middle" font-size="10" fill="#fff">反方</text>
  <circle cx="190" cy="360" r="20" fill="#10b981"/><text x="190" y="365" text-anchor="middle" font-size="10" fill="#fff">裁决</text>
  <g stroke="#64748b" stroke-width="1.5">
    <path d="M145 298 Q190 280 235 298" fill="none" marker-end="url(#a3)"/>
    <path d="M235 315 Q190 333 148 313" fill="none" marker-end="url(#a3)"/>
  </g>
  <text x="190" y="400" text-anchor="middle" font-size="11" fill="#64748b">高风险判断 · 降低自信幻觉 · token 成本翻倍</text>

  <!-- 象限4：Swarm -->
  <text x="570" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">④ Swarm 群体投票</text>
  <g fill="#0ea5e9">
    <circle cx="490" cy="300" r="16"/><circle cx="545" cy="290" r="16"/><circle cx="600" cy="300" r="16"/><circle cx="650" cy="292" r="16"/>
  </g>
  <rect x="520" y="345" width="100" height="32" rx="8" fill="#10b981"/>
  <text x="570" y="366" text-anchor="middle" font-size="11" fill="#fff">多数派聚合</text>
  <g stroke="#64748b" stroke-width="1.2" marker-end="url(#a3)">
    <line x1="495" y1="315" x2="540" y2="343"/><line x1="548" y1="306" x2="560" y2="340"/><line x1="598" y1="316" x2="585" y2="340"/><line x1="645" y1="308" x2="605" y2="343"/>
  </g>
  <text x="570" y="400" text-anchor="middle" font-size="11" fill="#64748b">封闭性问题 · 冗余换可靠性 · 产出型任务不适用</text>

  <line x1="380" y1="48" x2="380" y2="405" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="40" y1="228" x2="720" y2="228" stroke="#e2e8f0" stroke-width="1.5"/>
</svg>
