<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="760" height="360" fill="#f8fafc" rx="8"/>
  <!-- 左：N×M -->
  <text x="190" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">MCP 之前：N × M 集成</text>
  <g font-size="12" fill="#fff" text-anchor="middle">
    <rect x="60" y="60" width="90" height="34" rx="6" fill="#6366f1"/><text x="105" y="82">Claude</text>
    <rect x="60" y="120" width="90" height="34" rx="6" fill="#6366f1"/><text x="105" y="142">Cursor</text>
    <rect x="60" y="180" width="90" height="34" rx="6" fill="#6366f1"/><text x="105" y="202">自研 Agent</text>
    <rect x="240" y="60" width="90" height="34" rx="6" fill="#0ea5e9"/><text x="285" y="82">数据库</text>
    <rect x="240" y="120" width="90" height="34" rx="6" fill="#0ea5e9"/><text x="285" y="142">Slack</text>
    <rect x="240" y="180" width="90" height="34" rx="6" fill="#0ea5e9"/><text x="285" y="202">内部 API</text>
  </g>
  <g stroke="#cbd5e1" stroke-width="1.5">
    <line x1="150" y1="77" x2="240" y2="77"/><line x1="150" y1="77" x2="240" y2="137"/><line x1="150" y1="77" x2="240" y2="197"/>
    <line x1="150" y1="137" x2="240" y2="77"/><line x1="150" y1="137" x2="240" y2="137"/><line x1="150" y1="137" x2="240" y2="197"/>
    <line x1="150" y1="197" x2="240" y2="77"/><line x1="150" y1="197" x2="240" y2="137"/><line x1="150" y1="197" x2="240" y2="197"/>
  </g>
  <text x="190" y="250" text-anchor="middle" font-size="12" fill="#ef4444">9 套定制集成，各自维护</text>
  <!-- 分隔 -->
  <line x1="380" y1="40" x2="380" y2="320" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- 右：N+M -->
  <text x="570" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">MCP 之后：N + M 标准化</text>
  <g font-size="12" fill="#fff" text-anchor="middle">
    <rect x="420" y="60" width="90" height="34" rx="6" fill="#6366f1"/><text x="465" y="82">Claude</text>
    <rect x="420" y="120" width="90" height="34" rx="6" fill="#6366f1"/><text x="465" y="142">Cursor</text>
    <rect x="420" y="180" width="90" height="34" rx="6" fill="#6366f1"/><text x="465" y="202">自研 Agent</text>
    <rect x="630" y="60" width="90" height="34" rx="6" fill="#0ea5e9"/><text x="675" y="82">数据库</text>
    <rect x="630" y="120" width="90" height="34" rx="6" fill="#0ea5e9"/><text x="675" y="142">Slack</text>
    <rect x="630" y="180" width="90" height="34" rx="6" fill="#0ea5e9"/><text x="675" y="202">内部 API</text>
  </g>
  <rect x="545" y="60" width="50" height="154" rx="8" fill="#10b981"/>
  <text x="570" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" transform="rotate(-90 570 130)">MCP 协议</text>
  <g stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)">
    <line x1="510" y1="77" x2="540" y2="100"/><line x1="510" y1="137" x2="540" y2="137"/><line x1="510" y1="197" x2="540" y2="174"/>
    <line x1="595" y1="100" x2="625" y2="77"/><line x1="595" y1="137" x2="625" y2="137"/><line x1="595" y1="174" x2="625" y2="197"/>
  </g>
  <text x="570" y="250" text-anchor="middle" font-size="12" fill="#10b981">Client 实现一次 + Server 实现一次 = 6 份工作</text>
  <g font-size="11" fill="#64748b">
    <text x="420" y="295">原语：Tools（模型控制） · Resources（应用控制） · Prompts（用户控制）</text>
    <text x="420" y="315">传输：stdio（本地） · Streamable HTTP（远程） · 基于 JSON-RPC 2.0</text>
  </g>
</svg>
